services:
  - type: web
    name: foodiehub
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: mongodb+srv://admin:adminn@cluster0.dnellwt.mongodb.net/foodiehub-db?appName=Cluster0
      - key: JWT_SECRET
        value: supersecretfoodiehubkey
